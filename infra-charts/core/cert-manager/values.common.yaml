cert-manager:
  prometheus:
    enabled: true
    servicemonitor:
      enabled: true
      interval: 60s
      scrapeTimeout: 30s

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  webhook:
    resources:
      requests:
        cpu: 70m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  cainjector:
    resources:
      requests:
        cpu: 70m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
